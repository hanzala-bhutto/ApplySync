# Alembic configuration for ApplySync.
#
# The database URL is intentionally NOT set here. alembic/env.py supplies it,
# defaulting to settings.db_path (the same .env-driven path the app uses) and
# accepting a per-run override so init_db and the tests can point it at a
# specific file. This keeps one source of truth for where the database lives.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# Migration filenames: NNNN_slug (zero-padded, human-orderable), not a random hash.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
# WARNING keeps steady-state quiet: init_db runs `upgrade head` on every sync,
# and at INFO that logs a few lines each time even when nothing needs applying.
# `applysync db upgrade` echoes the revision explicitly for when you do want it.
level = WARNING
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
