<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ApplySync{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
          },
        },
      },
    }
  </script>
</head>
<body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
  <header class="border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
    <div class="mx-auto flex max-w-6xl items-baseline gap-3 px-6 py-4">
      <a href="/" class="text-lg font-semibold tracking-tight">ApplySync</a>
      <span class="text-sm text-slate-400 dark:text-slate-500">your job applications, in one place</span>
    </div>
  </header>
  <main class="mx-auto max-w-6xl px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
