<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ApplySync{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eef2ff', 100: '#e0e7ff', 400: '#818cf8',
              500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
            },
          },
        },
      },
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: color-mix(in srgb, CanvasText 25%, transparent); border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="h-full font-sans antialiased bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <header class="sticky top-0 z-10 border-b border-slate-200/80 bg-white/80 backdrop-blur dark:border-slate-800/80 dark:bg-slate-950/80">
    <div class="mx-auto flex max-w-7xl items-center gap-3 px-6 py-4">
      <a href="/" class="flex items-center gap-2.5">
        <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 text-sm font-bold text-white shadow-sm">A</span>
        <span class="text-[17px] font-bold tracking-tight">ApplySync</span>
      </a>
      <span class="hidden text-sm text-slate-400 sm:inline dark:text-slate-500">your job applications, in one place</span>
    </div>
  </header>
  <main class="mx-auto max-w-7xl px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
