<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ApplySync{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0 1.5rem 3rem;
      background: Canvas;
      color: CanvasText;
    }
    header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 1.25rem 0;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
    }
    header h1 { font-size: 1.25rem; margin: 0; }
    header a { color: inherit; text-decoration: none; }
    header .tagline { font-size: 0.85rem; opacity: 0.65; }
    main { max-width: 1100px; margin: 0 auto; padding-top: 1.5rem; }
    section { margin-bottom: 2.5rem; }
    h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent); }
    a.card-link { color: inherit; text-decoration: none; }
    a.card-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">ApplySync</a></h1>
    <span class="tagline">your job applications, in one place</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
